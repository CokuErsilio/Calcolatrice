<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Calcolatrice</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111827;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: #f9fafb;
    }

    .calculator {
      background: #1f2937;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      width: 280px;
    }

    .display {
      width: 100%;
      height: 60px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
      background: #111827;
      color: #f9fafb;
      font-size: 24px;
      padding: 10px;
      text-align: right;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      height: 50px;
      border-radius: 8px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      transition: 0.15s;
    }

    button.number {
      background: #374151;
      color: #f9fafb;
    }

    button.operator {
      background: #4b5563;
      color: #fbbf24;
    }

    button.equal {
      background: #10b981;
      color: #022c22;
      grid-column: span 2;
    }

    button.clear {
      background: #ef4444;
      color: #fef2f2;
    }

    button:active {
      transform: scale(0.96);
      filter: brightness(1.1);
    }
  </style>
</head>
<body>
  <div class="calculator">
    <input type="text" class="display" id="display" readonly />

    <div class="buttons">

      <!-- Prima riga: parentesi + clear + divisione -->
      <button class="clear" onclick="clearDisplay()">C</button>
      <button class="operator" onclick="appendValue('(')">(</button>
      <button class="operator" onclick="appendValue(')')">)</button>
      <button class="operator" onclick="appendValue('+')">+</button>

      <!-- Seconda riga -->
      <button class="number" onclick="appendValue('7')">7</button>
      <button class="number" onclick="appendValue('8')">8</button>
      <button class="number" onclick="appendValue('9')">9</button>
      <button class="operator" onclick="appendValue('-')">-</button>

      <!-- Terza riga -->
      <button class="number" onclick="appendValue('4')">4</button>
      <button class="number" onclick="appendValue('5')">5</button>
      <button class="number" onclick="appendValue('6')">6</button>
      <button class="operator" onclick="appendValue('*')">*</button>

      <!-- Quarta riga -->
      <button class="number" onclick="appendValue('1')">1</button>
      <button class="number" onclick="appendValue('2')">2</button>
      <button class="number" onclick="appendValue('3')">3</button>
      <button class="operator" onclick="appendValue('/')">/</button>

      <!-- Quinta riga -->
      <button class="number" onclick="appendValue('.')">.</button>
      <button class="number" onclick="appendValue('0')">0</button>
      <button class="equal" onclick="calculate()">=</button>

    </div>
  </div>

  <script>
    const display = document.getElementById('display');

    function appendValue(value) {
      display.value += value;
    }

    function clearDisplay() {
      display.value = '';
    }

    function calculate() {
      try {
        const result = eval(display.value);
        display.value = result;
      } catch (e) {
        display.value = 'Errore';
        setTimeout(() => display.value = '', 1000);
      }
    }

    document.addEventListener('keydown', (e) => {
      const key = e.key;

      if (!isNaN(key) || ['+', '-', '*', '/', '.', '(', ')'].includes(key)) {
        appendValue(key);
      } else if (key === 'Enter') {
        e.preventDefault();
        calculate();
      } else if (key === 'Backspace') {
        display.value = display.value.slice(0, -1);
      } else if (key === 'Escape') {
        clearDisplay();
      }
    });
  </script>
</body>
</html>
